services:
  - type: web
    name: matura-korrekturplattform
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production
      - key: OPENAI_MODEL
        value: gpt-5.4
